name: Deploy fork to Test VM

# Auto-deploys this Documenso fork to the Azure test VM on every push to `dev`.
# Model: dev → test VM (this workflow) · main → prod (Railway builds the repo).
#
# It SSHes into the test VM and runs the same manual sequence you'd run by hand:
#   1. pull the latest source into the fork clone (~/naseh-documenso)
#   2. rebuild the image (same tag)
#   3. recreate the compose container (~/documenso) with the fresh image
# The container runs `prisma migrate deploy` on boot, so DB migrations apply automatically.
#
# Required GitHub secrets (repo → Settings → Secrets → Actions):
#   SSH_HOST  — the test VM host/IP (e.g. test-kayan.naseh.qa)
#   SSH_USER  — the SSH user (e.g. azureuser)
#   SSH_KEY   — the private SSH key with access to that user
#
# One-time VM setup (already done): ~/naseh-documenso is a clone of this repo,
# and ~/documenso/compose.yml points its documenso service at
# `image: naseh-documenso:v2.6.1-naseh`.

on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Build & redeploy on the test VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 30m # the Documenso image build is slow (~10–15 min)
          script: |
            set -e
            # 1. Pull the latest fork source
            cd ~/naseh-documenso
            git fetch origin
            git checkout dev
            git reset --hard origin/dev

            # 2. Rebuild the image (same tag the compose references)
            docker build -f docker/Dockerfile -t naseh-documenso:v2.6.1-naseh .

            # 3. Recreate the running container with the fresh image
            #    (migration runs on boot via docker/start.sh)
            cd ~/documenso
            docker compose up -d --force-recreate

            # 4. Reclaim disk from the rebuild. The BuildKit cache (~11 GB) is the
            #    big one and is NOT removed by `image prune` — pruning it here keeps
            #    repeated deploys from filling the OS disk (the earlier outage cause).
            docker builder prune -af
            docker image prune -f
